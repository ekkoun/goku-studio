# Alembic config for the Studio domain migration chain.
# Manages tables owned by goku-studio: agent_definitions, workflows, tools,
# mcp_servers, knowledge_docs, external_memory_sources, improvement_proposals,
# prompt_experiments, tool_call_stats, ira_*, plugins, auto_skills.
#
# Usage (from backend/):
#   alembic -c alembic/studio/alembic.ini upgrade head
#   alembic -c alembic/studio/alembic.ini revision --autogenerate -m "describe change"
#
# The file_template uses studio_ prefix to distinguish from core migrations.
# The first migration's down_revision must be "0086" (shared baseline).

[alembic]
script_location = alembic/studio
file_template = studio_%%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
