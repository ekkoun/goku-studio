version: "3.9"

# goku-studio standalone service
# Uses the same MySQL database as goku-core (shared-DB strategy, Phase B/C).
# Set DATABASE_URL to point at the same DB as goku-core.

services:
  studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8107}:8107"
    environment:
      PORT: "${PORT:-8107}"
      DATABASE_URL: "${DATABASE_URL}"
      SECRET_KEY: "${SECRET_KEY}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:5106}"
      AGENT_WORKSPACE: /workspace
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      # LLM (Studio uses LLM only for agent-config previews)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
    volumes:
      - workspace_data:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8107/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  workspace_data:
